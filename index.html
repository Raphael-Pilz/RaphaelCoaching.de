    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 500; color: var(--accent);
    font-family: 'Playfair Display', serif;
  }

  .author-name { font-size: 14px; font-weight: 500; }
  .author-role { font-size: 12px; color: var(--ink3); }

  /* CTA SECTION */
  .cta-section {
    max-width: 1200px; margin: 0 auto; padding: 100px 60px;
    text-align: center;
  }

  .cta-box {
    background: var(--ink);
    border-radius: 28px;
    padding: 80px 60px;
    position: relative;
    overflow: hidden;
  }

  .cta-box::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(74,144,217,0.12);
  }

  .cta-box::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: rgba(74,144,217,0.08);
  }

  .cta-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 20px;
  }

  .cta-box h2 {
    color: var(--white);
    font-size: clamp(36px, 4vw, 52px);
    margin-bottom: 16px;
  }

  .cta-sub {
    font-size: 16px; color: rgba(255,255,255,0.55);
    margin-bottom: 44px; font-weight: 300;
  }

  .cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

  .btn-white {
    display: inline-block;
    background: var(--white);
    color: var(--ink);
    padding: 16px 36px;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-white:hover { background: var(--accent); color: var(--white); transform: translateY(-2px); }

  .btn-outline-white {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
    padding: 16px 36px;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 400;
    font-size: 15px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-outline-white:hover { border-color: var(--white); color: var(--white); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 60px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1200px; margin: 0 auto;
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: var(--ink);
    text-decoration: none;
  }

  .footer-claim { font-size: 12px; color: var(--ink3); }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { font-size: 13px; color: var(--ink3); text-decoration: none; }
  .footer-links a:hover { color: var(--accent); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    .nav-links { gap: 20px; }
    .hero { grid-template-columns: 1fr; padding: 100px 24px 60px; gap: 48px; }
    .hero-visual { order: -1; }
    .photo-frame { max-width: 300px; margin: 0 auto; }
    .stats-row { padding: 0 24px 60px; flex-wrap: wrap; }
    .stat { flex: 1 1 45%; border-right: none; border-bottom: 1px solid var(--border); padding: 24px 0; }
    .section { padding: 60px 24px; }
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
.offer-grid { grid-template-columns: 1fr; }
    .forwhom-grid { grid-template-columns: 1fr; }
    .testimonial-grid { grid-template-columns: 1fr; }
    .cta-box { padding: 48px 28px; }
    footer { flex-direction: column; gap: 20px; text-align: center; padding: 32px 24px; }
  }
</style>
</head>

    tag:      "Stimmen",
    headline: "Was andere sagen.",
    zitate: [
      { zitat: "Raphael hat mir geholfen zu verstehen, was ich wirklich will – nicht nur was ich dachte zu wollen. Ein Game Changer.", name: "Lukas M.",  rolle: "Student & ambitionierter Sportler" },
      { zitat: "Nach der ersten Session hatte ich mehr Klarheit als nach monatelangem Grübeln. Sehr empfehlenswert.",                  name: "Sara K.",   rolle: "Berufseinsteigerin"                },
      { zitat: "Raphael hört wirklich zu und stellt die richtigen Fragen. Ich habe mich nach jeder Session besser und klarer gefühlt.", name: "Max T.",  rolle: "Junger Selbstständiger"            },
    ],
  },

  /* ---------- CTA / KONTAKT ---------- */
  cta: {
    eyebrow:   "Jetzt starten",
    headline1: "Jetzt ist der",
    headline2: "richtige Moment.",               // dieser Teil erscheint kursiv
    subtext:   "In jungen Jahren die Basis zu legen ist kein Vorteil – es ist der Unterschied. Kein Druck, keine Verpflichtung. Wir schauen gemeinsam, ob es passt.",
    btnPrimary:   "Kostenloses Erstgespräch",
    btnSecondary: "Angebote ansehen",
  },

  /* ---------- FOOTER ---------- */
  footer: {
    impressumLink:    "#",                        // ← Link zu deiner Impressum-Seite
    datenschutzLink:  "#",                        // ← Link zu deiner Datenschutz-Seite
  },

};

/* ============================================================
   🔒  AB HIER NICHTS MEHR ÄNDERN
   Der folgende Code baut die Seite automatisch aus dem
   CONFIG-Objekt oben zusammen.
   ============================================================ */
</script>

<!-- Leere Container – werden per JavaScript befüllt -->
<div id="site-nav"></div>
<div id="site-hero"></div>
<div id="site-stats"></div>
<div id="site-about"></div>
<div id="site-forwhom"></div>
<div id="site-angebote"></div>
<div id="site-stimmen"></div>
<div id="site-cta"></div>
<div id="site-footer"></div>

<script>
  /* --- NAV --- */
  document.getElementById('site-nav').innerHTML = `
    <nav>
      <a class="nav-logo" href="#">${CONFIG.name}</a>
      <div class="nav-links">
        <a href="#about">Über mich</a>
        <a href="#angebot">Angebot</a>
        <a href="#stimmen">Stimmen</a>
        <a href="" onclick="Calendly.initPopupWidget({url:'${CONFIG.calendly}'}); return false;" class="nav-cta">${CONFIG.nav.cta}</a>
      </div>
    </nav>`;

  /* --- HERO --- */
  document.getElementById('site-hero').innerHTML = `
    <section style="padding-top:0;">
      <div class="hero">
        <div class="hero-text">
          <div class="hero-eyebrow">${CONFIG.hero.eyebrow}</div>
          <h1>${CONFIG.hero.headline1}<br><em>${CONFIG.hero.headline2}</em></h1>
          <p class="hero-sub">${CONFIG.hero.subtext}</p>
          <div class="hero-actions">
            <a href="" onclick="Calendly.initPopupWidget({url:'${CONFIG.calendly}'}); return false;" class="btn-primary">${CONFIG.hero.btnPrimary}</a>
            <a href="#angebot" class="btn-ghost">${CONFIG.hero.btnSecondary}</a>
          </div>
        </div>
        <div class="hero-visual">
          <div class="photo-frame">
            ${CONFIG.foto
              ? `<img src="${CONFIG.foto}" alt="Foto von ${CONFIG.name}" class="photo-real">`
              : `<div class="photo-placeholder"><div class="photo-icon">📸</div><div class="photo-label">Foto folgt</div></div>`
            }
            <div class="photo-badge">
              <div class="badge-icon">${CONFIG.badge.icon}</div>
              <div class="badge-text">
                <strong>${CONFIG.badge.title}</strong>
                ${CONFIG.badge.subtitle}
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>`;

  /* --- STATS --- */
  const statsHTML = CONFIG.stats.map(s => `
    <div class="stat">
      <div class="stat-num">${s.num}<span>${s.suffix}</span></div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');
  document.getElementById('site-stats').innerHTML =
    `<div class="stats-row reveal">${statsHTML}</div>`;

  /* --- ABOUT --- */
  const valuesHTML = CONFIG.values.map(v => `
    <div class="value-item">
      <div class="value-icon">${v.icon}</div>
      <div class="value-content"><h4>${v.titel}</h4><p>${v.text}</p></div>
    </div>`).join('');
  document.getElementById('site-about').innerHTML = `
    <section class="section" id="about">
      <div class="about-grid reveal">
        <div class="about-text">
          <div class="section-tag">${CONFIG.about.tag}</div>
          <h2>${CONFIG.about.headline}</h2>
          <p>${CONFIG.about.absatz1}</p>
          <p>${CONFIG.about.absatz2}</p>
          <p>${CONFIG.about.absatz3}</p>
          <blockquote class="about-quote">
            <p>${CONFIG.about.zitat1}</p>
            <p>${CONFIG.about.zitat2}</p>
          </blockquote>
        </div>
        <div class="values-list">${valuesHTML}</div>
      </div>
    </section>`;

  /* --- FÜR WEN --- */
  const forWhomHTML = CONFIG.forWhom.gruppen.map(g => `
    <div class="forwhom-card">
      <div class="forwhom-icon">${g.icon}</div>
      <div class="forwhom-content"><h4>${g.titel}</h4><p>${g.text}</p></div>
    </div>`).join('');
  document.getElementById('site-forwhom').innerHTML = `
    <section class="forwhom-section">
      <div class="section">
        <div class="reveal">
          <div class="section-tag">${CONFIG.forWhom.tag}</div>
          <h2>${CONFIG.forWhom.headline}</h2>
        </div>
        <div class="forwhom-grid reveal">${forWhomHTML}</div>
      </div>
    </section>`;

  /* --- ANGEBOTE --- */
  const paketeHTML = CONFIG.angebote.pakete.map((p, i) => `
    <div class="offer-card ${p.empfohlen ? 'featured' : ''}">
      <div class="offer-num">${String(i+1).padStart(2,'0')}</div>
      <div class="offer-title">${p.titel}</div>
      <div class="offer-desc">${p.beschr}</div>
      <div class="offer-price">${p.preis}</div>
      <div class="offer-price-note">${p.preisNote}</div>
      <ul class="offer-features">
        ${p.features.map(f => `<li>${f}</li>`).join('')}
      </ul>
    </div>`).join('');
  document.getElementById('site-angebote').innerHTML = `
    <section class="offer-section" id="angebot">
      <div class="section">
        <div class="reveal">
          <div class="section-tag">${CONFIG.angebote.tag}</div>
          <h2>${CONFIG.angebote.headline}</h2>
          <p style="margin-top:16px; font-size:15px; color:var(--ink2); font-weight:300; max-width:680px; line-height:1.7;">${CONFIG.angebote.intro}</p>
          <div class="kennenlern-banner">
            <p><strong>Kostenlose Kennenlernstunde</strong> · ${CONFIG.angebote.kennenlern.text}</p>
            <a href="" onclick="Calendly.initPopupWidget({url:'${CONFIG.calendly}'}); return false;">${CONFIG.angebote.kennenlern.btn}</a>
          </div>
        </div>
        <div class="offer-grid reveal">${paketeHTML}</div>
      </div>
    </section>`;

  /* --- STIMMEN --- */
  const zitateHTML = CONFIG.stimmen.zitate.map(z => `
    <div class="testimonial-card">
      <div class="testimonial-quote">"${z.zitat}"</div>
      <div class="testimonial-author">
        <div class="author-avatar">${z.name.charAt(0)}</div>
        <div>
          <div class="author-name">${z.name}</div>
          <div class="author-role">${z.rolle}</div>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('site-stimmen').innerHTML = `
    <section class="section" id="stimmen">
      <div class="reveal">
        <div class="section-tag">${CONFIG.stimmen.tag}</div>
        <h2>${CONFIG.stimmen.headline}</h2>
      </div>
      <div class="testimonial-grid reveal">
        ${zitateHTML}
        <div class="testimonial-card" style="background:var(--accent-light);border-color:#b0ccee;">
          <div class="testimonial-quote" style="color:var(--ink2);">"Deine Erfahrung könnte hier stehen. Buche dein kostenloses Erstgespräch."</div>
          <div class="testimonial-author">
            <div class="author-avatar" style="background:var(--white);">?</div>
            <div>
              <div class="author-name">Du?</div>
              <div class="author-role">Dein nächstes Kapitel</div>
            </div>
          </div>
        </div>
      </div>
    </section>`;

  /* --- CTA --- */
  document.getElementById('site-cta').innerHTML = `
    <section class="cta-section" id="kontakt">
      <div class="cta-box reveal">
        <div class="cta-eyebrow">${CONFIG.cta.eyebrow}</div>
        <h2>${CONFIG.cta.headline1}<br><em style="font-style:italic;">${CONFIG.cta.headline2}</em></h2>
        <p class="cta-sub">${CONFIG.cta.subtext}</p>
        <div class="cta-actions">
          <a href="" onclick="Calendly.initPopupWidget({url:'${CONFIG.calendly}'}); return false;" class="btn-white">${CONFIG.cta.btnPrimary}</a>
          <a href="#angebot" class="btn-outline-white">${CONFIG.cta.btnSecondary}</a>
        </div>
      </div>
    </section>`;

  /* --- FOOTER --- */
  document.getElementById('site-footer').innerHTML = `
    <footer>
      <a class="footer-logo" href="#">${CONFIG.name}</a>
      <div class="footer-claim">${CONFIG.tagline}</div>
      <div class="footer-links">
        <a href="${CONFIG.footer.impressumLink}">Impressum</a>
        <a href="${CONFIG.footer.datenschutzLink}">Datenschutz</a>
      </div>
    </footer>`;

  /* --- SCROLL REVEAL --- */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
